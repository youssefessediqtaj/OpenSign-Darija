name: ml

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install numpy pytest
      - run: PYTHONPATH=. pytest ml/tests
      - run: python -m compileall -q ml scripts
      - run: |
          set +e
          PYTHONPATH=. python -m ml.datasets.validate_training_dataset --dataset-version 0.1.0
          test "$?" -eq 1
