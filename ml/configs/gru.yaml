experiment:
  name: opensign_pilot_gru
  seed: 42
dataset:
  version: "0.1.0"
  feature_schema_version: "1.0.0"
  target_frames: 30
  min_contributors_per_sign: 8
  min_repetitions_per_sign: 80
  min_validation_contributors_per_sign: 2
  min_test_contributors_per_sign: 2
model:
  architecture: bidirectional_gru
  hidden_size: 128
  num_layers: 2
  dropout: 0.3
training:
  batch_size: 32
  learning_rate: 0.001
  max_epochs: 100
  early_stopping_patience: 12
  gradient_clip_norm: 1.0
