experiment:
  name: mosl-word-isolated-baseline-v1
  seed: 42

dataset:
  source: mosl-video-dataset
  version: source-import-v1
  mode: WORD_ISOLATED
  manifest: ml/data/external/mosl-video-dataset/manifests/videos.jsonl
  splits: ml/data/external/mosl-video-dataset/splits
  schema_version: OPEN_SIGNE_LANDMARK_SCHEMA_V1
  split_seed: 42

sequence:
  max_frames: 60
  landmarks: 75
  coordinates: 3
  padding: zero
  truncation: head

model:
  type: gru
  hidden_size: 256
  num_layers: 2
  dropout: 0.2
  bidirectional: true

training:
  batch_size: 16
  epochs: 30
  learning_rate: 0.001
  early_stopping_patience: 5
  class_weighting: true
  smoke_max_classes: 5
  smoke_max_samples_per_class: 3
