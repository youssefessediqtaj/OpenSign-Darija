services:
  web:
    build:
      context: ./apps/web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_MEDIAPIPE_MODEL_PATH: ${VITE_MEDIAPIPE_MODEL_PATH:-/models/holistic_landmarker.task}
        VITE_MEDIAPIPE_WASM_PATH: ${VITE_MEDIAPIPE_WASM_PATH:-/mediapipe/wasm}
        VITE_CAMERA_DEFAULT_WIDTH: ${VITE_CAMERA_DEFAULT_WIDTH:-1280}
        VITE_CAMERA_DEFAULT_HEIGHT: ${VITE_CAMERA_DEFAULT_HEIGHT:-720}
        VITE_CAMERA_DEFAULT_FPS: ${VITE_CAMERA_DEFAULT_FPS:-30}
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "80"
    volumes:
      - ./ml/assets/mediapipe/holistic_landmarker.task:/usr/share/nginx/html/models/holistic_landmarker.task:ro

  api:
    build: ./services/api
    environment:
      APP_NAME: ${APP_NAME:-OpenSigne Darija}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      INFERENCE_SERVICE_URL: http://inference:8001
      INFERENCE_TIMEOUT_SECONDS: ${INFERENCE_TIMEOUT_SECONDS:-3}
      SPEECH_SERVICE_URL: http://speech:8010
      RECOGNITION_MAX_PAYLOAD_BYTES: ${RECOGNITION_MAX_PAYLOAD_BYTES:-1500000}
      RECOGNITION_MIN_DURATION_MS: ${RECOGNITION_MIN_DURATION_MS:-500}
      RECOGNITION_MAX_DURATION_MS: ${RECOGNITION_MAX_DURATION_MS:-8000}
      RECOGNITION_RATE_LIMIT: ${RECOGNITION_RATE_LIMIT:-30}
      RECOGNITION_MIN_USABLE_FRAMES: ${RECOGNITION_MIN_USABLE_FRAMES:-12}
      RECOGNITION_MIN_HAND_RATIO: ${RECOGNITION_MIN_HAND_RATIO:-0.35}
      RECOGNITION_MAX_MISSING_FRAME_RATIO: ${RECOGNITION_MAX_MISSING_FRAME_RATIO:-0.50}
      RECOGNITION_MIN_DYNAMIC_MOVEMENT: ${RECOGNITION_MIN_DYNAMIC_MOVEMENT:-0.04}
      SUPPORTED_SIGNS_PATH: ${SUPPORTED_SIGNS_PATH:-/workspace/artifacts/models/mosl-isolated-sign-v1/supported-signs.json}
      SPEECH_GENERATION_TIMEOUT_SECONDS: ${SPEECH_GENERATION_TIMEOUT_SECONDS:-20}
    volumes:
      - ./artifacts/models:/workspace/artifacts/models:ro
    depends_on:
      inference:
        condition: service_healthy
      speech:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import json,urllib.request; data=json.load(urllib.request.urlopen('http://localhost:8000/api/v1/health')); assert data['status']=='healthy'"
      interval: 10s
      timeout: 5s
      retries: 8

  inference:
    image: opensigne-darija-inference:latest
    build: ./services/inference
    environment:
      FEATURE_SCHEMA_VERSION: ${FEATURE_SCHEMA_VERSION:-OPEN_SIGNE_LANDMARK_SCHEMA_V1}
      MODEL_NAME: ${MODEL_NAME:-mosl-isolated-sign-v1}
      MODEL_VERSION: ${MODEL_VERSION:-1.0.0}
      MODEL_PATH: ${MODEL_PATH:-/workspace/artifacts/models/mosl-isolated-sign-v1/model.onnx}
      LABELS_PATH: ${LABELS_PATH:-/workspace/artifacts/models/mosl-isolated-sign-v1/labels.json}
      SUPPORTED_SIGNS_PATH: ${SUPPORTED_SIGNS_PATH:-/workspace/artifacts/models/mosl-isolated-sign-v1/supported-signs.json}
      CALIBRATION_PATH: ${CALIBRATION_PATH:-/workspace/artifacts/models/mosl-isolated-sign-v1/confidence-calibration.json}
      MODEL_CHECKSUM_REQUIRED: ${MODEL_CHECKSUM_REQUIRED:-true}
      MODEL_MAX_SIZE_BYTES: ${MODEL_MAX_SIZE_BYTES:-50000000}
      MODEL_WARMUP_ENABLED: ${MODEL_WARMUP_ENABLED:-true}
      ONNX_EXECUTION_PROVIDER: ${ONNX_EXECUTION_PROVIDER:-CPUExecutionProvider}
      INFERENCE_MAX_CONCURRENT_REQUESTS: ${INFERENCE_MAX_CONCURRENT_REQUESTS:-4}
    volumes:
      - ./artifacts/models:/workspace/artifacts/models:ro
    expose:
      - "8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/ready').read()"]
      interval: 10s
      timeout: 5s
      retries: 8

  speech:
    build: ./services/speech
    environment:
      SPEECH_MODE: ${SPEECH_MODE:-local}
      SPEECH_MODEL_VERSION: ${SPEECH_MODEL_VERSION:-opensign-system-arabic-v1}
      SPEECH_MAX_TEXT_LENGTH: ${SPEECH_MAX_TEXT_LENGTH:-500}
      SPEECH_MAX_SENTENCES: ${SPEECH_MAX_SENTENCES:-5}
      SPEECH_MAX_CONCURRENT_GENERATIONS: ${SPEECH_MAX_CONCURRENT_GENERATIONS:-2}
      SPEECH_GENERATION_TIMEOUT_SECONDS: ${SPEECH_GENERATION_TIMEOUT_SECONDS:-20}
    expose:
      - "8010"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/ready').read()"]
      interval: 10s
      timeout: 5s
      retries: 8

  # Optional one-shot verification of the already-local dataset. It shares the inference
  # image and performs no package installation or network/data download at container run.
  ml-audit:
    image: opensigne-darija-inference:latest
    profiles: ["ml"]
    working_dir: /workspace
    command: ["python", "-m", "ml.datasets.mosl_video.local_audit"]
    volumes:
      - ./:/workspace:ro
      - ./artifacts/reports:/workspace/artifacts/reports

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_healthy
    ports:
      - "${NGINX_HOST_PORT:-8081}:80"
    volumes:
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
