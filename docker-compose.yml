services:
  web:
    build:
      context: ./apps/web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_MEDIAPIPE_MODEL_PATH: ${VITE_MEDIAPIPE_MODEL_PATH:-https://storage.googleapis.com/mediapipe-models/holistic_landmarker/holistic_landmarker/float16/1/holistic_landmarker.task}
        VITE_MEDIAPIPE_WASM_PATH: ${VITE_MEDIAPIPE_WASM_PATH:-https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.35/wasm}
        VITE_CAMERA_DEFAULT_WIDTH: ${VITE_CAMERA_DEFAULT_WIDTH:-1280}
        VITE_CAMERA_DEFAULT_HEIGHT: ${VITE_CAMERA_DEFAULT_HEIGHT:-720}
        VITE_CAMERA_DEFAULT_FPS: ${VITE_CAMERA_DEFAULT_FPS:-30}
        VITE_LANDMARK_TARGET_FRAMES: ${VITE_LANDMARK_TARGET_FRAMES:-60}
        VITE_ENABLE_LANDMARK_OVERLAY: ${VITE_ENABLE_LANDMARK_OVERLAY:-true}
        VITE_ENABLE_PERFORMANCE_METRICS: ${VITE_ENABLE_PERFORMANCE_METRICS:-false}
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "80"

  api:
    build: ./services/api
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_NAME: ${APP_NAME:-OpenSign Darija}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-local-env}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-opensign}:${POSTGRES_PASSWORD:-opensign_dev_password}@postgres:5432/${POSTGRES_DB:-opensign}
      REDIS_URL: redis://redis:6379/0
      INFERENCE_SERVICE_URL: http://inference:8001
      INFERENCE_MODE: ${INFERENCE_MODE:-mock}
      ALLOW_SMOKE_MODEL_ACTIVATION: ${ALLOW_SMOKE_MODEL_ACTIVATION:-false}
      RECOGNITION_MAX_FRAMES: ${RECOGNITION_MAX_FRAMES:-60}
      RECOGNITION_MAX_PAYLOAD_BYTES: ${RECOGNITION_MAX_PAYLOAD_BYTES:-1500000}
      RECOGNITION_MIN_DURATION_MS: ${RECOGNITION_MIN_DURATION_MS:-500}
      RECOGNITION_MAX_DURATION_MS: ${RECOGNITION_MAX_DURATION_MS:-8000}
      RECOGNITION_RATE_LIMIT: ${RECOGNITION_RATE_LIMIT:-30}
      FEATURE_SCHEMA_VERSION: ${FEATURE_SCHEMA_VERSION:-1.0.0}
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-opensign}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-opensign_dev_password}
      MINIO_SECURE: "false"
      DATASET_PRESIGNED_URL_EXPIRE_SECONDS: ${DATASET_PRESIGNED_URL_EXPIRE_SECONDS:-600}
      DATASET_MAX_RECORDINGS_PER_CONTRIBUTION: ${DATASET_MAX_RECORDINGS_PER_CONTRIBUTION:-5}
      DATASET_CLEANUP_DRAFT_DAYS: ${DATASET_CLEANUP_DRAFT_DAYS:-7}
      LINGUISTIC_ENGINE_MODE: ${LINGUISTIC_ENGINE_MODE:-controlled}
      LINGUISTIC_ENGINE_VERSION: ${LINGUISTIC_ENGINE_VERSION:-1.0.0}
      LINGUISTIC_DICTIONARY_VERSION: ${LINGUISTIC_DICTIONARY_VERSION:-demo-1.0.0}
      LINGUISTIC_TEMPLATE_VERSION: ${LINGUISTIC_TEMPLATE_VERSION:-demo-1.0.0}
      MESSAGE_MAX_ITEMS: ${MESSAGE_MAX_ITEMS:-30}
      MESSAGE_MAX_TEXT_LENGTH: ${MESSAGE_MAX_TEXT_LENGTH:-1200}
      MESSAGE_MAX_REVISIONS: ${MESSAGE_MAX_REVISIONS:-80}
      MESSAGE_AUTOSAVE_DELAY_MS: ${MESSAGE_AUTOSAVE_DELAY_MS:-800}
      MESSAGE_HISTORY_ENABLED: ${MESSAGE_HISTORY_ENABLED:-true}
      GUEST_MESSAGE_TTL_MINUTES: ${GUEST_MESSAGE_TTL_MINUTES:-120}
      SPEECH_SERVICE_URL: http://speech:8010
      SPEECH_MODE: ${SPEECH_MODE:-local}
      SPEECH_PROVIDER: ${SPEECH_PROVIDER:-local_darija}
      SPEECH_MODEL_BUCKET: ${SPEECH_MODEL_BUCKET:-opensign-speech-models}
      SPEECH_MODEL_VERSION: ${SPEECH_MODEL_VERSION:-opensign-tone-v1}
      SPEECH_DEFAULT_VOICE_ID: ${SPEECH_DEFAULT_VOICE_ID:-darija-default}
      SPEECH_FALLBACK_PROVIDER: ${SPEECH_FALLBACK_PROVIDER:-local_arabic_fallback}
      SPEECH_MAX_TEXT_LENGTH: ${SPEECH_MAX_TEXT_LENGTH:-500}
      SPEECH_MAX_SENTENCES: ${SPEECH_MAX_SENTENCES:-5}
      SPEECH_MAX_CONCURRENT_GENERATIONS: ${SPEECH_MAX_CONCURRENT_GENERATIONS:-2}
      SPEECH_GENERATION_TIMEOUT_SECONDS: ${SPEECH_GENERATION_TIMEOUT_SECONDS:-20}
      SPEECH_CACHE_TTL_SECONDS: ${SPEECH_CACHE_TTL_SECONDS:-3600}
      SPEECH_GUEST_AUDIO_TTL_SECONDS: ${SPEECH_GUEST_AUDIO_TTL_SECONDS:-3600}
      SPEECH_USER_AUDIO_TTL_SECONDS: ${SPEECH_USER_AUDIO_TTL_SECONDS:-86400}
      SPEECH_AUDIO_FORMAT: ${SPEECH_AUDIO_FORMAT:-wav}
      SPEECH_SAMPLE_RATE: ${SPEECH_SAMPLE_RATE:-22050}
      SPEECH_MODEL_CHECKSUM_REQUIRED: ${SPEECH_MODEL_CHECKSUM_REQUIRED:-false}
      SPEECH_ENABLE_BROWSER_FALLBACK: ${SPEECH_ENABLE_BROWSER_FALLBACK:-true}
      SPEECH_AUDIO_BUCKET: ${SPEECH_AUDIO_BUCKET:-opensign-speech-audio}
      SPEECH_SIGNED_URL_TTL_SECONDS: ${SPEECH_SIGNED_URL_TTL_SECONDS:-900}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      inference:
        condition: service_healthy
      speech:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/version').read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  inference:
    build: ./services/inference
    environment:
      FEATURE_SCHEMA_VERSION: ${FEATURE_SCHEMA_VERSION:-1.0.0}
      INFERENCE_MODE: ${INFERENCE_MODE:-mock}
      MODEL_NAME: ${MODEL_NAME:-opensign-darija-landmark-mock}
      MODEL_VERSION: ${MODEL_VERSION:-0.2.0}
      MODEL_PATH: ${MODEL_PATH:-}
      LABELS_PATH: ${LABELS_PATH:-}
      THRESHOLDS_PATH: ${THRESHOLDS_PATH:-}
      CALIBRATION_PATH: ${CALIBRATION_PATH:-}
      ACTIVE_MODEL_ID: ${ACTIVE_MODEL_ID:-}
      MODEL_BUCKET: ${MODEL_BUCKET:-opensign-model-artifacts}
      MODEL_CACHE_DIR: ${MODEL_CACHE_DIR:-/tmp/opensign-model-cache}
      MODEL_MAX_SIZE_BYTES: ${MODEL_MAX_SIZE_BYTES:-50000000}
      ONNX_EXECUTION_PROVIDER: ${ONNX_EXECUTION_PROVIDER:-CPUExecutionProvider}
    volumes:
      - ./artifacts/models:/workspace/artifacts/models:ro
    expose:
      - "8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  ml-trainer:
    image: python:3.12-slim
    profiles: ["ml"]
    working_dir: /workspace
    command: ["bash", "-lc", "python -m pip install -r ml/requirements-train.txt && python -m ml.datasets.mosl_video.training_manifest"]
    environment:
      MEDIAPIPE_HOLISTIC_MODEL_PATH: /workspace/ml/assets/mediapipe/holistic_landmarker.task
    volumes:
      - ./:/workspace

  speech:
    build: ./services/speech
    environment:
      SPEECH_MODE: ${SPEECH_MODE:-local}
      SPEECH_PROVIDER: ${SPEECH_PROVIDER:-local_darija}
      SPEECH_MODEL_VERSION: ${SPEECH_MODEL_VERSION:-opensign-tone-v1}
      SPEECH_DEFAULT_VOICE_ID: ${SPEECH_DEFAULT_VOICE_ID:-darija-default}
      SPEECH_FALLBACK_PROVIDER: ${SPEECH_FALLBACK_PROVIDER:-local_arabic_fallback}
      SPEECH_MAX_TEXT_LENGTH: ${SPEECH_MAX_TEXT_LENGTH:-500}
      SPEECH_MAX_SENTENCES: ${SPEECH_MAX_SENTENCES:-5}
      SPEECH_MAX_CONCURRENT_GENERATIONS: ${SPEECH_MAX_CONCURRENT_GENERATIONS:-2}
      SPEECH_GENERATION_TIMEOUT_SECONDS: ${SPEECH_GENERATION_TIMEOUT_SECONDS:-20}
      SPEECH_AUDIO_FORMAT: ${SPEECH_AUDIO_FORMAT:-wav}
      SPEECH_SAMPLE_RATE: ${SPEECH_SAMPLE_RATE:-22050}
    expose:
      - "8010"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  speech-worker:
    build: ./services/api
    command: ["sh", "-c", "while true; do python -m app.jobs.cleanup_expired_audio; sleep 60; done"]
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-opensign}:${POSTGRES_PASSWORD:-opensign_dev_password}@postgres:5432/${POSTGRES_DB:-opensign}
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-opensign}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-opensign_dev_password}
      MINIO_SECURE: "false"
      SPEECH_AUDIO_BUCKET: ${SPEECH_AUDIO_BUCKET:-opensign-speech-audio}
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opensign}
      POSTGRES_USER: ${POSTGRES_USER:-opensign}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opensign_dev_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opensign} -d ${POSTGRES_DB:-opensign}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-opensign}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-opensign_dev_password}
    volumes:
      - minio-data:/data
      - ./infrastructure/scripts:/workspace/infrastructure/scripts:ro
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - api
    ports:
      - "${NGINX_HOST_PORT:-8081}:80"
    volumes:
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres-data:
  redis-data:
  minio-data:
